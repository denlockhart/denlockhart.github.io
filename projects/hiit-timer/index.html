<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>HIIT Timer</title>
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <header>
    <h1>HIIT Timer</h1>
    <p id="interval-summary">20 seconds on · 30 seconds off</p>
  </header>

  <main>
    <section class="panel intervals-panel">
      <h2>Intervals</h2>
      <div class="interval-row">
        <label class="interval-field">
          <span>Work (seconds)</span>
          <div class="stepper">
            <button type="button" class="step-btn" data-target="work" data-delta="-5" aria-label="Decrease work time">−</button>
            <input id="work-input" type="number" min="5" max="600" value="20" inputmode="numeric">
            <button type="button" class="step-btn" data-target="work" data-delta="5" aria-label="Increase work time">+</button>
          </div>
        </label>
        <label class="interval-field">
          <span>Rest (seconds)</span>
          <div class="stepper">
            <button type="button" class="step-btn" data-target="rest" data-delta="-5" aria-label="Decrease rest time">−</button>
            <input id="rest-input" type="number" min="5" max="600" value="30" inputmode="numeric">
            <button type="button" class="step-btn" data-target="rest" data-delta="5" aria-label="Increase rest time">+</button>
          </div>
        </label>
      </div>
      <div class="preset-row" aria-label="Quick presets">
        <button type="button" class="preset-btn" data-work="20" data-rest="30">20 / 30</button>
        <button type="button" class="preset-btn" data-work="30" data-rest="40">30 / 40</button>
        <button type="button" class="preset-btn" data-work="40" data-rest="60">40 / 60</button>
      </div>
    </section>

    <section class="panel timer-panel" aria-live="polite">
      <p class="phase-label" id="phase-label">Ready</p>
      <p class="timer-display" id="timer-display">00:20</p>
      <p class="round-label" id="round-label">Round 1 of 8</p>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </section>

    <section class="panel controls-panel">
      <div class="actions">
        <button type="button" class="primary" id="btn-start">Start</button>
        <button type="button" id="btn-pause" disabled>Pause</button>
        <button type="button" id="btn-reset">Reset</button>
      </div>
    </section>

    <section class="panel settings-panel">
      <h2>Settings</h2>
      <label>
        Rounds
        <input id="rounds-input" type="number" min="1" max="99" value="8" inputmode="numeric">
      </label>
      <label class="checkbox-row">
        <input id="sound-toggle" type="checkbox" checked>
        Announce work and rest
      </label>
    </section>
  </main>

  <footer>
    <p><a href="/">denlockhart.com</a></p>
  </footer>

  <script src="app.js?v=16"></script>
</body>
</html>
